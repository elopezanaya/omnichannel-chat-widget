name: storybook-release
on: 
  push:
    branches: 
      - main
    tags:
      - 'w-v*'
    paths:
      - 'chat-widget/**'

permissions:
  actions: write
  contents: write
  deployments: write
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checking out for ${{ github.ref }}
        uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16.X
      - name: Install Chat Widget packages
        working-directory: chat-widget
        run: echo "simulation of storybooks"
